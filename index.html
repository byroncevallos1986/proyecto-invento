<!DOCTYPE html>
<html>

<head>

<title>INVENTO</title>
<link rel="icon" href="favicon.ico">

<style>

body{
margin:0;
font-family:Arial;
display:flex;
}

/* TOPBAR */
#topbar{
height:60px;
width:100%;
background:#1e293b;
color:white;
display:none;
align-items:center;
justify-content:space-between;
padding:0 20px;
position:fixed;
top:0;
left:0;
z-index:1000;
}

#menuToggle{
font-size:26px;
cursor:pointer;
}

#userInfoTop{
display:flex;
align-items:center;
gap:10px;
max-width:50%;
}

#userPhotoTop{
width:35px;
height:35px;
border-radius:50%;
}

#userEmailTop{
font-size:13px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:250px;
}

/* SIDEBAR */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
opacity:0;
visibility:hidden;
transition:0.3s;
z-index:900;
}

#overlay.active{
opacity:1;
visibility:visible;
}

#sidebar{
width:220px;
height:calc(100vh - 60px);
background:#1e293b;
color:white;
position:fixed;
left:-220px;
top:60px;
transition:0.3s;
display:flex;
flex-direction:column;
z-index:1001;
}

#sidebar.active{
left:0;
}

.menu{
padding:15px;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
font-size:16px;
}

.menu:hover{
background:#334155;
}

/* CONTENT */
#content{
flex:1;
padding:80px 30px 30px 30px;
width:100%;
}

/* TABLA */
#tablaUsuarios{
display:none;
margin-top:30px;
width:100%;
border-collapse:collapse;
}

#tablaUsuarios th, #tablaUsuarios td{
border-bottom:1px solid #ddd;
padding:10px;
text-align:left;
}

#tablaUsuarios th{
background:#f1f5f9;
}

.estado-activo{
color:green;
font-weight:bold;
}

.estado-inactivo{
color:red;
font-weight:bold;
}

/* MODAL BASE */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:2000;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
width:400px;
border-radius:10px;
}

/* MODAL FORM */
.modal-form{
width:420px;
padding:25px;
border-radius:12px;
}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.close-btn{
cursor:pointer;
font-size:18px;
color:#64748b;
}

.form-group{
margin-bottom:15px;
display:flex;
flex-direction:column;
}

.input-form{
padding:10px;
border-radius:10px;
border:1px solid #cbd5e1;
}

.form-actions{
display:flex;
gap:10px;
margin-top:20px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn-primario{
background:#2563eb;
color:white;
}

.btn-secundario{
background:#e5e7eb;
}

</style>

<script type="module" src="app.js"></script>

</head>

<body>

<!-- TOPBAR -->
<div id="topbar">
<div id="menuToggle">☰</div>
<div id="userInfoTop">
<img id="userPhotoTop">
<div id="userEmailTop"></div>
</div>
</div>

<div id="overlay"></div>

<!-- SIDEBAR -->
<div id="sidebar">

<div class="menu" id="menuDashboard">📊 Dashboard</div>

<div class="menu" id="menuAdministracion">⚙️ Administración</div>

<div class="menu" id="menuLogout">🚪 Logout</div>

</div>

<!-- CONTENT -->
<div id="content">

<h1 id="tituloPagina">INVENTO</h1>

<button id="btnAbrirModalNuevo" class="btn-primario" style="display:none;">
➕ Nuevo Usuario
</button>

<table id="tablaUsuarios">
<thead>
<tr>
<th>NOMBRES</th>
<th>APELLIDOS</th>
<th>EMAIL</th>
<th>PERMISOS</th>
<th>ESTADO</th>
<th>ACCIÓN</th>
</tr>
</thead>
<tbody id="tbodyUsuarios"></tbody>
</table>

<button id="login">Login con Google</button>
<div id="mensaje"></div>

</div>

<!-- MODAL NUEVO -->
<div id="modalNuevoUsuario" class="modal">
<div class="modal-content">

<h3>Nuevo Usuario</h3>

<input type="text" id="modalNombres" placeholder="Nombres">
<input type="text" id="modalApellidos" placeholder="Apellidos">
<input type="email" id="modalEmail" placeholder="Email">

<button id="btnCrearUsuarioModal">Crear</button>
<button id="btnCancelarModal">Cancelar</button>

</div>
</div>

<!-- MODAL EDITAR -->
<div id="modalEditar" class="modal">
<div class="modal-content modal-form">

<h3>Actualizar Usuario</h3>

<input type="hidden" id="editId">

<input type="text" id="editNombres">
<input type="text" id="editApellidos">
<input type="email" id="editEmail">

<select id="editPermisos">
<option value="admin">Administrador</option>
<option value="operador">Operador</option>
</select>

<label>
<input type="checkbox" id="editEstado"> Activo
</label>

<button id="btnGuardarCambios">Actualizar</button>

</div>
</div>

</body>
</html>
