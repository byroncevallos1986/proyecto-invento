<!DOCTYPE html>
<html>

<head>

<title>INVENTO</title>
<link rel="icon" href="favicon.ico">

<style>

body{
margin:0;
font-family:Arial;
display:flex;
}

/* TOPBAR */
#topbar{
height:60px;
width:100%;
background:#1e293b;
color:white;
display:none;
align-items:center;
justify-content:space-between;
padding:0 20px;
position:fixed;
top:0;
left:0;
z-index:1000;
}

#menuToggle{
font-size:26px;
cursor:pointer;
}

#userInfoTop{
display:flex;
align-items:center;
gap:10px;
max-width:50%;
}

#userPhotoTop{
width:35px;
height:35px;
border-radius:50%;
}

#userEmailTop{
font-size:13px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:250px;
}

/* SIDEBAR */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
opacity:0;
visibility:hidden;
transition:0.3s;
z-index:900;
}

#overlay.active{
opacity:1;
visibility:visible;
}

#sidebar{
width:220px;
height:calc(100vh - 60px);
background:#1e293b;
color:white;
position:fixed;
left:-220px;
top:60px;
transition:0.3s;
display:flex;
flex-direction:column;
z-index:1001;
}

#sidebar.active{
left:0;
}

.menu{
padding:15px;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
font-size:16px;
}

.menu:hover{
background:#334155;
}

.submenu{
display:none;
flex-direction:column;
background:#334155;
}

.submenu.active{
display:flex;
}

.submenu-item{
padding:12px 15px 12px 40px;
cursor:pointer;
font-size:14px;
}

.submenu-item:hover{
background:#475569;
}

/* CONTENT */
#content{
flex:1;
padding:80px 30px 30px 30px;
width:100%;
}

/* TABLA */
#tablaUsuarios{
display:none;
margin-top:30px;
width:100%;
border-collapse:collapse;
}

#tablaUsuarios th, #tablaUsuarios td{
border-bottom:1px solid #ddd;
padding:10px;
text-align:left;
}

#tablaUsuarios th{
background:#f1f5f9;
}

.estado-activo{
color:green;
font-weight:bold;
}

.estado-inactivo{
color:red;
font-weight:bold;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:2000;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
width:400px;
border-radius:10px;
}

.campoFormulario{
margin-bottom:15px;
}

.campoFormulario input{
width:100%;
padding:8px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn-primario{
background:#2563eb;
color:white;
}

</style>

<script type="module" src="app.js"></script>

</head>

<body>

<!-- TOPBAR -->
<div id="topbar">
<div id="menuToggle">☰</div>
<div id="userInfoTop">
<img id="userPhotoTop">
<div id="userEmailTop"></div>
</div>
</div>

<div id="overlay"></div>

<!-- SIDEBAR -->
<div id="sidebar">

<div class="menu" id="menuDashboard">📊 Dashboard</div>

<div class="menu" id="menuAdministracion">⚙️ Administración</div>

<div class="submenu" id="submenuAdministracion">
<div class="submenu-item" id="menuActualizarUsuario">✏️ Actualizar Usuario</div>
</div>

<div class="menu" id="menuLogout">🚪 Logout</div>

</div>

<!-- CONTENT -->
<div id="content">

<div style="display:flex; justify-content:space-between; align-items:center;">
<h1 id="tituloPagina">INVENTO</h1>

<button id="btnAbrirModalNuevo" class="btn-primario" style="display:none;">
➕ Nuevo Usuario
</button>
</div>

<table id="tablaUsuarios">
<thead>
<tr>
<th>NOMBRES</th>
<th>APELLIDOS</th>
<th>EMAIL</th>
<th>PERMISOS</th>
<th>ESTADO</th>
<th>ACCIÓN</th>
</tr>
</thead>
<tbody id="tbodyUsuarios"></tbody>
</table>

<button id="login">Login con Google</button>
<div id="mensaje"></div>

</div>

<!-- MODAL NUEVO -->
<div id="modalNuevoUsuario" class="modal">
<div class="modal-content">

<div style="display:flex; justify-content:space-between;">
<h3>Nuevo Usuario</h3>
<span id="cerrarModalNuevo">✖</span>
</div>

<div class="campoFormulario">
<label>Nombres *</label>
<input type="text" id="modalNombres">
</div>

<div class="campoFormulario">
<label>Apellidos *</label>
<input type="text" id="modalApellidos">
</div>

<div class="campoFormulario">
<label>Email *</label>
<input type="email" id="modalEmail">
</div>

<div style="display:flex; justify-content:space-between;">
<button id="btnCancelarModal">Cancelar</button>
<button id="btnCrearUsuarioModal" class="btn-primario">Crear Usuario</button>
</div>

</div>
</div>

<!-- MODAL EDITAR -->
<div id="modalEditar" class="modal">
<div class="modal-content">

<h3>Editar Usuario</h3>

<input type="hidden" id="editId">

<div class="campoFormulario">
<input type="text" id="editNombres">
</div>

<div class="campoFormulario">
<input type="text" id="editApellidos">
</div>

<div class="campoFormulario">
<input type="email" id="editEmail">
</div>

<div class="campoFormulario">
<input type="text" id="editPermisos">
</div>

<div class="campoFormulario">
<select id="editEstado">
<option value="true">Activo</option>
<option value="false">Inactivo</option>
</select>
</div>

<button id="btnGuardarCambios">Guardar</button>
<button onclick="document.getElementById('modalEditar').style.display='none'">Cancelar</button>

</div>
</div>

</body>
</html>
