<!DOCTYPE html>
<html>

<head>
  <title>INVENTO</title>
  <link rel="icon" href="favicon.ico">
  <style>

    body{
        margin:0;
        font-family: Arial;
        display:flex;
    }

    /* SIDEBAR */

    #sidebar{
        width:220px;
        height:100vh;
        background:#1e293b;
        color:white;

        /* IMPORTANTE:
           Sidebar oculto por defecto.
           Solo se mostrará después del login
           desde app.js
        */
        display:none;

        flex-direction:column;

        justify-content:space-between;
    }

    #logo{
        height:90px;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        border-bottom:1px solid #334155;
        gap:5px;
    }

    #userPhoto{
        width:40px;
        height:40px;
        border-radius:50%;
    }

    #userEmail{
        font-size:12px;
        text-align:center;
    }

    .menu{
        padding:15px;
        cursor:pointer;
        display:flex;
        align-items:center;
        gap:10px;
        font-size:16px;
    }

    .menu:hover{
        background:#334155;
    }

    /* CONTENIDO */

    #content{
        flex:1;
        padding:30px;
    }

    .menu.active{
        background:#475569;
    }

  </style>

  <script type="module" src="app.js"></script>

</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar">

    <div>

        <div id="logo">
            <img id="userPhoto">
            <div id="userEmail"></div>
        </div>

        <div class="menu" id="menuDashboard">
            📊 Dashboard
        </div>

        <div class="menu" id="menuCategorias">
            🗂️ Categorías
        </div>

        <div class="menu" id="menuProductos">
            📦 Productos
        </div>

        <div class="menu" id="menuMovimientos">
            🔄 Movimientos
        </div>

    </div>

    <div>

        <div class="menu" id="menuLogout">
            🚪 Logout
        </div>

    </div>

</div>

<!-- CONTENIDO PRINCIPAL -->

<div id="content">

    <h1 id="tituloPagina">INVENTO</h1>

    <button id="login">
        Login con Google
    </button>

    <div id="mensaje"></div>

</div>

</body>
</html>
