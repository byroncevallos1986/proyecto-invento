<!DOCTYPE html>
<html>

<head>

<title>INVENTO</title>
<link rel="icon" href="favicon.ico">

<style>

body{
margin:0;
font-family:Arial;
display:flex;
}

/* ====== ERRORES ====== */
.error{
color:red;
font-size:12px;
margin-top:5px;
display:none;
}

/* ====== RESTO IGUAL ====== */

#topbar{
height:60px;
width:100%;
background:#1e293b;
color:white;
display:none;
align-items:center;
justify-content:space-between;
padding:0 20px;
position:fixed;
top:0;
left:0;
z-index:1000;
}

#menuToggle{font-size:26px;cursor:pointer;}

#sidebar{
width:220px;
height:calc(100vh - 60px);
background:#1e293b;
color:white;
position:fixed;
left:-220px;
top:60px;
transition:0.3s;
display:flex;
flex-direction:column;
}

#sidebar.active{left:0;}

.menu{padding:15px;cursor:pointer;}
.submenu{display:none;}
.submenu.active{display:block;}

#content{
flex:1;
padding:80px 30px;
}

#formNuevoUsuario{
display:none;
max-width:500px;
margin-top:40px;
}

.campoFormulario{
margin-bottom:15px;
}

input{
width:100%;
padding:8px;
}

</style>

<script type="module" src="app.js"></script>

</head>

<body>

<div id="topbar">
<div id="menuToggle">☰</div>
</div>

<div id="sidebar">

<div class="menu" id="menuDashboard">📊 Dashboard</div>

<div class="menu" id="menuAdministracion">⚙️ Administración</div>

<div class="submenu" id="submenuAdministracion">

<div class="submenu-item" id="menuNuevoUsuario">👤 Nuevo Usuario</div>
<div class="submenu-item" id="menuActualizarUsuario">✏️ Actualizar Usuario</div>

</div>

</div>

<div id="content">

<h1 id="tituloPagina">INVENTO</h1>

<div id="formNuevoUsuario">

<div class="campoFormulario">
<label>Nombres:</label>
<input type="text" id="inputNombres">
<div id="errorNombres" class="error">
El campo acepta únicamente caracteres alfabéticos y no puede estar vacío
</div>
</div>

<div class="campoFormulario">
<label>Apellidos:</label>
<input type="text" id="inputApellidos">
<div id="errorApellidos" class="error">
El campo acepta únicamente caracteres alfabéticos y no puede estar vacío
</div>
</div>

<div class="campoFormulario">
<label>Email:</label>
<input type="email" id="inputEmail">
<div id="errorEmail" class="error">
Correo no válido o ya registrado. Use el formato usuario@gmail.com.
</div>
</div>

<button id="btnIngresarUsuario">Ingresar</button>

</div>

<button id="login">Login con Google</button>

<div id="mensaje"></div>

</div>

</body>
</html>
