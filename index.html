<!DOCTYPE html>
<html>

<head>

<!-- =====================================================
TÍTULO DE LA PÁGINA
===================================================== -->

<title>INVENTO</title>

<!-- =====================================================
ICONO DEL SITIO
===================================================== -->

<link rel="icon" href="favicon.ico">

<style>

/* =====================================================
CONFIGURACIÓN GENERAL
===================================================== */

body{
margin:0;
font-family:Arial;
display:flex;
}

/* =====================================================
BARRA SUPERIOR
===================================================== */

#topbar{

height:60px;
width:100%;

background:#1e293b;
color:white;

display:none;

align-items:center;
justify-content:space-between;

padding:0 20px;

position:fixed;
top:0;
left:0;

z-index:1000;
}

/* botón hamburguesa */

#menuToggle{
font-size:26px;
cursor:pointer;
}

/* =====================================================
INFORMACIÓN USUARIO
===================================================== */

#userInfoTop{
display:flex;
align-items:center;
gap:10px;
max-width:50%;
}

/* foto */

#userPhotoTop{
width:35px;
height:35px;
border-radius:50%;
}

/* email */

#userEmailTop{

font-size:13px;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;

max-width:250px;

}

/* =====================================================
OVERLAY
===================================================== */

#overlay{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.4);

opacity:0;
visibility:hidden;

transition:0.3s;

z-index:900;

}

#overlay.active{
opacity:1;
visibility:visible;
}

/* =====================================================
SIDEBAR
===================================================== */

#sidebar{

width:220px;

height:calc(100vh - 60px);

background:#1e293b;
color:white;

position:fixed;

left:-220px;

top:60px;

transition:0.3s;

display:flex;
flex-direction:column;

z-index:1001;

}

#sidebar.active{
left:0;
}

/* =====================================================
MENÚ PRINCIPAL
===================================================== */

.menu{

padding:15px;

cursor:pointer;

display:flex;
align-items:center;

gap:10px;

font-size:16px;

}

.menu:hover{
background:#334155;
}

.menu.active{
background:#475569;
}

/* =====================================================
SUBMENÚ
===================================================== */

.submenu{

display:none;
flex-direction:column;

background:#334155;

}

/* submenú visible */

.submenu.active{
display:flex;
}

/* item submenú */

.submenu-item{

padding:12px 15px 12px 40px;

cursor:pointer;

font-size:14px;

}

.submenu-item:hover{
background:#475569;
}

/* =====================================================
CONTENIDO
===================================================== */

#content{

flex:1;

padding:80px 30px 30px 30px;

width:100%;

}

</style>

<script type="module" src="app.js"></script>

</head>

<body>

<!-- =====================================================
TOPBAR
===================================================== -->

<div id="topbar">

<div id="menuToggle">
☰
</div>

<div id="userInfoTop">

<img id="userPhotoTop">

<div id="userEmailTop"></div>

</div>

</div>

<!-- =====================================================
OVERLAY
===================================================== -->

<div id="overlay"></div>

<!-- =====================================================
SIDEBAR
===================================================== -->

<div id="sidebar">

<!-- DASHBOARD -->

<div class="menu" id="menuDashboard">
📊 Dashboard
</div>

<!-- ADMINISTRACIÓN -->

<div class="menu" id="menuAdministracion">
⚙️ Administración
</div>

<!-- SUBMENÚ ADMINISTRACIÓN -->

<div class="submenu" id="submenuAdministracion">

<div class="submenu-item" id="menuNuevoUsuario">
👤 Nuevo Usuario
</div>

<div class="submenu-item" id="menuActualizarUsuario">
✏️ Actualizar Usuario
</div>

</div>

<!-- CATEGORÍAS -->

<div class="menu" id="menuCategorias">
🗂️ Categorías
</div>

<!-- PRODUCTOS -->

<div class="menu" id="menuProductos">
📦 Productos
</div>

<!-- MOVIMIENTOS -->

<div class="menu" id="menuMovimientos">
🔄 Movimientos
</div>

<!-- LOGOUT -->

<div class="menu" id="menuLogout">
🚪 Logout
</div>

</div>

<!-- =====================================================
CONTENIDO
===================================================== -->

<div id="content">

<h1 id="tituloPagina">INVENTO</h1>

<button id="login">
Login con Google
</button>

<div id="mensaje"></div>

</div>

</body>

</html>
