<!DOCTYPE html>
<html>

<head>

<title>INVENTO</title>

<link rel="icon" href="favicon.ico">

<style>

body{
margin:0;
font-family:Arial;
display:flex;
}

/* =========================
TOPBAR
========================= */

#topbar{
height:60px;
width:100%;
background:#1e293b;
color:white;

display:none;

align-items:center;
justify-content:space-between;

padding:0 20px;

position:fixed;
top:0;
left:0;

z-index:1000;
}

#menuToggle{
font-size:26px;
cursor:pointer;
}

#userInfoTop{
display:flex;
align-items:center;
gap:10px;
}

#userPhotoTop{
width:35px;
height:35px;
border-radius:50%;
}

#userEmailTop{
font-size:13px;
white-space:nowrap;
}

/* =========================
OVERLAY
========================= */

#overlay{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.4);

opacity:0;
visibility:hidden;

transition:0.3s;

z-index:900;

}

#overlay.active{
opacity:1;
visibility:visible;
}

/* =========================
SIDEBAR
========================= */

#sidebar{

width:220px;
height:100vh;

background:#1e293b;
color:white;

position:fixed;

left:-220px;
top:60px;

transition:0.3s;

display:flex;
flex-direction:column;

z-index:1001;

}

#sidebar.active{
left:0;
}

.menu{
padding:15px;
cursor:pointer;

display:flex;
align-items:center;

gap:10px;

font-size:16px;
}

.menu:hover{
background:#334155;
}

.menu.active{
background:#475569;
}

/* =========================
LOGOUT
========================= */

#menuLogout{
margin-top:auto;
border-top:1px solid #334155;
}

/* =========================
CONTENIDO
========================= */

#content{
flex:1;
padding:80px 30px 30px 30px;
}

</style>

<script type="module" src="app.js"></script>

</head>

<body>

<!-- TOPBAR -->

<div id="topbar">

<div id="menuToggle">
☰
</div>

<div id="userInfoTop">

<img id="userPhotoTop">

<div id="userEmailTop"></div>

</div>

</div>

<!-- OVERLAY -->

<div id="overlay"></div>

<!-- SIDEBAR -->

<div id="sidebar">

<div class="menu" id="menuDashboard">
📊 Dashboard
</div>

<div class="menu" id="menuCategorias">
🗂️ Categorías
</div>

<div class="menu" id="menuProductos">
📦 Productos
</div>

<div class="menu" id="menuMovimientos">
🔄 Movimientos
</div>

<div class="menu" id="menuLogout">
🚪 Logout
</div>

</div>

<!-- CONTENIDO -->

<div id="content">

<h1 id="tituloPagina">INVENTO</h1>

<button id="login">
Login con Google
</button>

<div id="mensaje"></div>

</div>

</body>

</html>
